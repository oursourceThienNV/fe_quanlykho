<form [formGroup]="dataForm" (ngSubmit)="save()">
  <div class="modal-header">
    <h3 class="modal-title mt-0"><b>{{title}}</b></h3>
    <button type="button" class="btn-close" aria-hidden="true" (click)="modal.dismiss('Cross click')"></button>
  </div>
  <div class="modal-body">
    <div class="row">
      <div class="col-md-6">
        <div class="mb-2">
          <label for="code">Mã<span class="text-muted">(Tùy chọn)</span></label>
          <input id="code" type="text" class="form-control" formControlName="code" disabled maxlength="50">
        </div>
      </div>
      <!-- Full Name -->
      <div class="col-md-6">
        <div class="mb-2">
          <label for="fullname">Họ tên<span class="text-danger">*</span></label>
          <input id="fullname" type="text" class="form-control" formControlName="fullName" disabled maxlength="100" required>
        </div>
      </div>

      <!-- Gender -->
      <div class="col-md-6">
        <div class="mb-2">
          <label for="gender">Giới tính<span class="text-danger">*</span></label>
          <select id="gender" class="form-control" formControlName="gender" disabled required>
            <option value="nam">Nam</option>
            <option value="nu">Nữ</option>
            <option value="khac">Khác</option>
          </select>
        </div>
      </div>

      <!-- Phone -->
      <div class="col-md-6">
        <div class="mb-2">
          <label for="phone">Số điện thoại<span class="text-danger">*</span></label>
          <input id="phone" type="text" class="form-control" formControlName="phone" disabled maxlength="20" required>
        </div>
      </div>

      <!-- Email -->
      <div class="col-md-6">
        <div class="mb-2">
          <label for="email">Email<span class="text-danger">*</span></label>
          <input id="email" type="email" class="form-control" formControlName="email" disabled maxlength="100" required>
        </div>
      </div>

      <!-- Address -->
      <div class="col-md-6">
        <div class="mb-2">
          <label for="address">Địa chỉ<span class="text-danger">*</span></label>
          <textarea id="address" class="form-control" formControlName="address" maxlength="255" disabled rows="2" required></textarea>
        </div>
      </div>

      <!-- Guests -->
      <div class="col-md-6">
        <div class="mb-2">
          <label for="guests">Số lượng khách<span class="text-danger">*</span></label>
          <input id="guests" type="number" class="form-control" formControlName="guests" disabled min="0" required>
        </div>
      </div>

      <!-- Children -->
      <div class="col-md-6">
        <div class="mb-2">
          <label for="children">Số lượng trẻ em<span class="text-danger">*</span></label>
          <input id="children" type="number" class="form-control" formControlName="children" disabled min="0" required>
        </div>
      </div>

      <!-- Reason -->
      <div class="col-md-12">
        <div class="mb-2">
          <label for="reason">Nhu cầu của khách hàng<span class="text-danger">*</span></label>
          <textarea id="reason" class="form-control" formControlName="reason" maxlength="4000" disabled rows="4" required></textarea>
        </div>
      </div>

      <!-- Code -->


      <!-- Status -->
      <div class="col-md-12">
        <div class="mb-2">
          <label >Trạng thái</label>
          <select class="form-control" formControlName="status">
            <option value="01">Tư vấn xong</option>
            <option value="02">Đang trong quá trình tư vấn</option>
            <option value="03">Tư vấn thất bại</option>
          </select>
        </div>
      </div>

      <!-- Description -->
      <div class="col-md-12">
        <div class="mb-2">
          <label for="description">Mô tả<span class="text-muted">(Tùy chọn)</span></label>
          <textarea id="description" class="form-control" formControlName="description" maxlength="4000" rows="3"></textarea>
        </div>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button type="submit" class="btn btn-primary">Lưu</button>
    <button type="button" class="btn btn-light" (click)="modal.close('Close click')">Hủy</button>
  </div>
</form>
