<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký tham quan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      padding: 50px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background-color: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #4CAF50;
    }

    h2 {
      margin-top: 20px;
      color: #4CAF50;
    }

    .section {
      margin-bottom: 20px;
    }

    label {
      font-size: 16px;
      display: block;
      margin-bottom: 5px;
      color: #555;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }

    /*input[type="date"], input[type="time"], input[type="number"], input[type="email"], input[type="tel"] {*/
    /*  width: 48%;*/
    /*  display: inline-block;*/
    /*}*/

    textarea {
      height: 100px;
      resize: vertical;
    }

    button.submit-btn {
      width: 100%;
      padding: 15px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button.submit-btn:hover {
      background-color: #45a049;
    }

    .confirmation {
      margin-top: 20px;
      text-align: center;
      font-size: 16px;
      color: #555;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Đăng ký tư vấn tham gia du lịch</h1>
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <!-- Thông tin khách tham quan -->
    <div class="section">
      <h2>Thông tin đăng ký tham quan</h2>
      <label for="fullname">Họ và tên:</label>
      <input type="text" id="fullname" formControlName="fullname" required />

      <label for="gender">Giới tính:</label>
      <select id="gender" formControlName="gender" required>
        <option value="nam">Nam</option>
        <option value="nu">Nữ</option>
        <option value="khac">Khác</option>
      </select>

      <label for="phone">Số điện thoại:</label>
      <input type="tel" id="phone" formControlName="phone" required />

      <label for="email">Email:</label>
      <input type="email" id="email" formControlName="email" required />

      <label for="address">Địa chỉ:</label>
      <textarea id="address" formControlName="address" required></textarea>
    </div>

    <!-- Thông tin chuyến tham quan -->
    <div class="section">
      <h2>Thông tin về chuyến tham quan</h2>
      <label for="guests">Số lượng khách tham gia:</label>
      <input type="number" id="guests" formControlName="guests" required />

      <label for="children">Trẻ em:</label>
      <input type="number" id="children" formControlName="children" required />

      <label for="reason">Mô tả mong muốn tham gia:</label>
      <textarea id="reason" formControlName="reason" required></textarea>
    </div>

    <!-- Nút gửi đăng ký -->
    <div class="section">
      <button type="submit" class="submit-btn">
        Gửi đăng ký
      </button>
    </div>
  </form>
</div>

</body>
</html>
